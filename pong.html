<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong Game</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #111;
      border: 2px solid #fff;
    }
    #score {
      position: absolute;
      top: 20px;
      color: #fff;
      font-size: 24px;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="score">Player 1: 0 | Player 2: 0</div>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game variables
    const paddleWidth = 10;
    const paddleHeight = 100;
    const ballRadius = 10;
    let player1Score = 0;
    let player2Score = 0;
    let keys = {};

    // Paddle positions
    let player1 = {
      x: 10,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
    };

    let player2 = {
      x: canvas.width - 10 - paddleWidth,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
    };

    // Ball position
    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: ballRadius,
      speed: 5,
      dx: 5,
      dy: 3,
    };

    // Handle keyboard input
    document.addEventListener("keydown", (e) => {
      if (e.key === "w") keys["w"] = true;
      if (e.key === "s") keys["s"] = true;
      if (e.key === "ArrowUp") keys["ArrowUp"] = true;
      if (e.key === "ArrowDown") keys["ArrowDown"] = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "w") keys["w"] = false;
      if (e.key === "s") keys["s"] = false;
      if (e.key === "ArrowUp") keys["ArrowUp"] = false;
      if (e.key === "ArrowDown") keys["ArrowDown"] = false;
    });

    // Update paddle positions
    function updatePaddles() {
      if (keys["w"] && player1.y > 0) player1.y -= 7;
      if (keys["s"] && player1.y < canvas.height - paddleHeight) player1.y += 7;
      if (keys["ArrowUp"] && player2.y > 0) player2.y -= 7;
      if (keys["ArrowDown"] && player2.y < canvas.height - paddleHeight) player2.y += 7;
    }

    // Draw paddles
    function drawPaddles() {
      ctx.fillStyle = "#fff";
      ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
      ctx.fillRect(player2.x, player2.y, player2.width, player2.height);
    }

    // Draw ball
    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.closePath();
    }

    // Collision detection
    function checkCollision() {
      // Ball and top/bottom walls
      if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.dy = -ball.dy;
      }

      // Ball and paddles
      if (
        ball.x - ball.radius < player1.x + player1.width &&
        ball.y > player1.y &&
        ball.y < player1.y + player1.height
      ) {
        ball.dx = -ball.dx;
      }

      if (
        ball.x + ball.radius > player2.x &&
        ball.y > player2.y &&
        ball.y < player2.y + player2.height
      ) {
        ball.dx = -ball.dx;
      }

      // Scoring
      if (ball.x - ball.radius > canvas.width) {
        player1Score++;
        resetBall();
      } else if (ball.x + ball.radius < 0) {
        player2Score++;
        resetBall();
      }
    }

    // Reset ball position
    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx = -ball.dx;
    }

    // Draw score
    function drawScore() {
      document.getElementById("score").innerText = `Player 1: ${player1Score} | Player 2: ${player2Score}`;
    }

    // Game loop
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updatePaddles();
      checkCollision();
      drawPaddles();
      drawBall();
      drawScore();
      ball.x += ball.dx;
      ball.y += ball.dy;
      requestAnimationFrame(gameLoop);
    }

    // Start the game
    gameLoop();
  </script>
</body>
</html>
